<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bypass GAS Frame Protection</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: sans-serif;
        }
        #container {
            width: 100%;
            height: 100%;
            border: none;
        }
        .loading {
            padding: 20px;
            text-align: center;
            font-size: 18px;
            color: #555;
        }
    </style>
</head>
<body>

    <div id="loading" class="loading">Memuat konten tanpa proteksi...</div>
    <div id="container"></div>

    <script>
        const targetGasUrl = "https://script.google.com/macros/s/AKfycbwO9Bo1e5C2LWff4HTEz5V7Mp9bQPCQcomPmhZdbyVarcpWKTbfprgUYbgLeAZO_Y4_Bw/exec?page=admin"; 
        const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(targetGasUrl);

        fetch(proxyUrl)
            .then(response => {
                if (!response.ok) throw new Error('Proxy gagal merespons.');
                // PERBAIKAN DI SINI: Gunakan .text(), bukan .json()
                return response.text(); 
            })
            .then(htmlContent => {
    document.getElementById('loading').style.display = 'none';

    // 1. Ubah konten HTML mentah menjadi Objek Dokumen
    const parser = new DOMParser();
    const docWithBrokenLinks = parser.parseFromString(htmlContent, 'text/html');

    // 2. Perbaiki semua URL relatif menjadi absolut agar CSS & JS biasa tidak 404
    const makeLinksAbsolute = (attributeName, tagName) => {
        const elements = docWithBrokenLinks.querySelectorAll(tagName);
        elements.forEach(el => {
            const relativeUrl = el.getAttribute(attributeName);
            if (relativeUrl && !relativeUrl.startsWith('http') && !relativeUrl.startsWith('//')) {
                const baseUrl = "https://script.google.com";
                el.setAttribute(attributeName, baseUrl + relativeUrl);
            }
        });
    };
    makeLinksAbsolute('href', 'link');
    makeLinksAbsolute('src', 'script');
    makeLinksAbsolute('src', 'img');

    // ==========================================
    // 3. TRIK PAMUNGKAS: HANCURKAN SKRIP WARDEN GOOGLE
    // ==========================================
    // A. Buat elemen script baru untuk menyuntikkan objek 'goog' palsu ke dalam iframe
    const mockGoogScript = docWithBrokenLinks.createElement('script');
    mockGoogScript.innerHTML = `
        // Kita buat fungsi kosong yang aman
        const blankFunction = function() { return blankProxy; };
        
        // Proxy ini akan menangkap semua panggilan fungsi bertingkat (seperti goog.something.init())
        const blankProxy = new Proxy(blankFunction, {
            get: function(target, prop) {
                return blankProxy;
            }
        });

        // Daftarkan objek goog dan fungsi onload-nya menggunakan proxy sakti tadi
        window.goog = blankProxy;
        window.goog.onload = function() {
            console.log('%c[Bypass] Seluruh objek goog (termasuk .init) berhasil dilewati lewat Proxy!', 'color: green; background: black;');
        };
    `;
    // Taruh script palsu ini di bagian paling atas head agar dibaca duluan
    docWithBrokenLinks.head.insertBefore(mockGoogScript, docWithBrokenLinks.head.firstChild);

    // B. Lanjutkan menghapus script pelindung asli bawaan Google (Tetap sama seperti sebelumnya)
    const allScripts = docWithBrokenLinks.querySelectorAll('script');
    allScripts.forEach(script => {
        const src = script.getAttribute('src') || '';
        const innerCode = script.innerHTML || '';

        if (src.includes('warden') || innerCode.includes('wardeninit')) {
            console.log('%c[Bypass] Menghapus skrip pelindung Google: ', 'color: yellow; background: black;', src || 'Inline Script');
            script.remove();
        }
    });
    // ==========================================

    // 4. Ambil kembali HTML yang sudah "dibersihkan"
    // 4. Ambil kembali HTML yang sudah "dibersihkan"
    let fixedHtmlContent = docWithBrokenLinks.documentElement.outerHTML;

    // Tambahkan CSS paksa di dalam HTML sebelum masuk iframe agar semua elemen yang tadinya disembunyikan Google dipaksa muncul
    const forceShowCss = `
        <style>
            body, html, div, iframe, form { 
                display: block !important; 
                visibility: visible !important; 
                opacity: 1 !important; 
            }
            .goog-inline-block, .sandbox-content-container { 
                display: block !important; 
            }
        </style>
    `;
    fixedHtmlContent = fixedHtmlContent.replace('</head>', forceShowCss + '</head>');

    // 5. Tampilkan ke dalam iframe lokal biasa
    const container = document.getElementById('container');
    container.innerHTML = '';

    const iframe = document.createElement('iframe');
    iframe.style.width = '100%';
    iframe.style.height = '100%';
    iframe.style.border = 'none';
    
    container.appendChild(iframe);
    
    const doc = iframe.contentWindow.document;
    doc.open();
    doc.write(fixedHtmlContent);
    doc.close();
})
            .catch(error => {
                document.getElementById('loading').innerText = "Gagal memuat: " + error.message;
                console.error(error);
            });
    </script>
</body>
</html>
