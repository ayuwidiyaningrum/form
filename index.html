<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bypass GAS Frame Protection</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: sans-serif;
        }
        #container {
            width: 100%;
            height: 100%;
            border: none;
        }
        .loading {
            padding: 20px;
            text-align: center;
            font-size: 18px;
            color: #555;
        }
    </style>
</head>
<body>

    <div id="loading" class="loading">Memuat konten tanpa proteksi...</div>
    <div id="container"></div>

    <script>
        const targetGasUrl = "https://script.google.com/macros/s/AKfycbwO9Bo1e5C2LWff4HTEz5V7Mp9bQPCQcomPmhZdbyVarcpWKTbfprgUYbgLeAZO_Y4_Bw/exec?page=admin"; 
        const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(targetGasUrl);

        fetch(proxyUrl)
            .then(response => {
                if (!response.ok) throw new Error('Proxy gagal merespons.');
                // PERBAIKAN DI SINI: Gunakan .text(), bukan .json()
                return response.text(); 
            })
            .then(htmlContent => {
    // Sembunyikan tulisan loading
    document.getElementById('loading').style.display = 'none';

    // 1. Perbaikan Kunci: Mengubah konten HTML mentah menjadi Objek Dokumen agar bisa dimanipulasi
    const parser = new DOMParser();
    const docWithBrokenLinks = parser.parseFromString(htmlContent, 'text/html');

    // 2. Perbaikan Kunci: Cari semua link CSS, Script, dan Image, lalu ubah URL-nya menjadi absolut
    // Ini memastikan browser mencari file Google di Google, bukan di domain GitHub-mu
    const makeLinksAbsolute = (attributeName, tagName) => {
        const elements = docWithBrokenLinks.querySelectorAll(tagName);
        elements.forEach(el => {
            const relativeUrl = el.getAttribute(attributeName);
            // Periksa jika URL-nya ada dan bersifat relatif (tidak diawali dengan 'http' atau '//')
            if (relativeUrl && !relativeUrl.startsWith('http') && !relativeUrl.startsWith('//')) {
                // Tembakkan ke URL absolut Google Script yang benar
                // Ganti URL ini jika URL GAS utamamu berbeda
                const baseUrl = "https://script.google.com";
                el.setAttribute(attributeName, baseUrl + relativeUrl);
            }
        });
    };

    // Jalankan fungsi perbaikan untuk tag yang paling penting
    makeLinksAbsolute('href', 'link');    // Perbaiki link CSS
    makeLinksAbsolute('src', 'script');   // Perbaiki link JavaScript
    makeLinksAbsolute('src', 'img');      // Perbaiki link Gambar

    // 3. Ambil kembali HTML yang sudah diperbaiki
    const fixedHtmlContent = docWithBrokenLinks.documentElement.outerHTML;

    // Hapus iframe lama jika ada
    const container = document.getElementById('container');
    container.innerHTML = '';

    // 4. Buat iframe baru menggunakan metode SRCDOC + Sandbox
    const iframe = document.createElement('iframe');
    iframe.style.width = '100%';
    iframe.style.height = '100%';
    iframe.style.border = 'none';
    
    // Memberikan izin eksekusi script tetapi membatasi deteksi top-domain
    iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms');

    // Memasukkan seluruh HTML langsung sebagai dokumen lokal iframe
    // Kita lakukan escape tanda kutip agar tidak merusak atribut HTML
    iframe.srcdoc = fixedHtmlContent;
    
    container.appendChild(iframe);
})
            .catch(error => {
                document.getElementById('loading').innerText = "Gagal memuat: " + error.message;
                console.error(error);
            });
    </script>
</body>
</html>
