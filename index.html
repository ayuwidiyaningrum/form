<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bypass GAS Frame Protection</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: sans-serif;
        }
        #container {
            width: 100%;
            height: 100%;
            border: none;
        }
        .loading {
            padding: 20px;
            text-align: center;
            font-size: 18px;
            color: #555;
        }
    </style>
</head>
<body>

    <div id="loading" class="loading">Memuat konten tanpa proteksi...</div>
    <div id="container"></div>

    <script>
        const targetGasUrl = "https://script.google.com/macros/s/AKfycbwO9Bo1e5C2LWff4HTEz5V7Mp9bQPCQcomPmhZdbyVarcpWKTbfprgUYbgLeAZO_Y4_Bw/exec?page=admin"; 
        const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(targetGasUrl);

        fetch(proxyUrl)
            .then(response => {
                if (!response.ok) throw new Error('Proxy gagal merespons.');
                // PERBAIKAN DI SINI: Gunakan .text(), bukan .json()
                return response.text(); 
            })
            .then(htmlContent => {
                // Sembunyikan tulisan loading
                document.getElementById('loading').style.display = 'none';

                // Buat iframe lokal baru
                const iframe = document.createElement('iframe');
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                iframe.style.border = 'none';
                
                document.getElementById('container').appendChild(iframe);
                
                // Tulis isi HTML dari proxy ke dalam iframe lokal
                const doc = iframe.contentWindow.document;
                doc.open();
                doc.write(htmlContent);
                doc.close();
            })
            .catch(error => {
                document.getElementById('loading').innerText = "Gagal memuat: " + error.message;
                console.error(error);
            });
    </script>
</body>
</html>
